<body>
  <app-root>

      Placeholder estático visible antes de que Angular arranque.

      <div style="border-radius:16px;overflow:hidden;height:300px;background:#e5e7eb;">

             decoding="sync"
             width="1920"
             height="1080"
             style="width:100%;height:100%;object-fit:contain;"
