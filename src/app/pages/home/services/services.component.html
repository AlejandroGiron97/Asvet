<section id="servicios" class="py-24 bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-5xl font-extrabold text-blue-900 tracking-tight uppercase">Nuestros Servicios</h2>
      <p class="mt-4 text-lg md:text-xl text-gray-500 max-w-3xl mx-auto">Excelencia veterinaria en cada detalle, cuidando a tu mascota con amor y tecnología.</p>
      <div class="mt-6 w-28 h-1.5 bg-orange-500 mx-auto rounded-full"></div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">

      <div *ngFor="let servicio of servicios"
           class="bg-white rounded-2xl md:rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col h-full group hover:-translate-y-1">

        <div class="h-32 md:h-56 lg:h-64 w-full overflow-hidden relative bg-gray-200 cursor-pointer" (click)="abrirAgenda(servicio.titulo)">
          <img [src]="servicio.imagenUrl" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">

          <div class="absolute inset-0 bg-black/10 group-hover:bg-black/0 transition-colors duration-300"></div>
        </div>

        <div class="p-4 md:p-6 text-center flex-grow flex flex-col justify-between">
          <div>
            <h3 class="text-sm md:text-xl font-bold mb-2 text-blue-900 leading-tight">{{ servicio.titulo }}</h3>
            <p class="text-sm text-gray-600 leading-relaxed italic hidden md:block mb-4">{{ servicio.descripcion }}</p>
          </div>

          <button (click)="abrirAgenda(servicio.titulo)"
                  class="mt-2 bg-orange-50 text-orange-600 font-bold py-2 px-4 rounded-full w-full text-sm md:text-base group-hover:bg-orange-500 group-hover:text-white transition-all duration-300">
            Agendar Cita
          </button>
        </div>
      </div>

    </div>
  </div>
</section>

<div *ngIf="mostrarModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fadeIn">

  <div class="bg-white rounded-[2rem] shadow-2xl p-8 max-w-sm w-full relative animate-fadeInUp">

    <button (click)="cerrarAgenda()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 transition-colors">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>

    <div class="text-center mb-6 mt-2">
      <div class="bg-green-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">📱</div>
      <h3 class="text-2xl font-extrabold text-blue-900 mb-1">Agendar Cita</h3>
      <p class="text-gray-600 mb-2">Servicio: <span class="font-bold text-orange-500">{{ servicioSeleccionado }}</span></p>
      <p class="text-gray-500 text-sm">¿En qué sede te gustaría ser atendido?</p>
    </div>

    <div class="flex flex-col gap-3">
      <button (click)="agendarPorWhatsApp('manizales')"
              class="bg-[#25D366] hover:bg-[#1da851] text-white font-bold py-4 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 group">
         📍 Sede Manizales
      </button>

      <button (click)="agendarPorWhatsApp('pereira')"
              class="bg-[#25D366] hover:bg-[#1da851] text-white font-bold py-4 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 group">
         📍 Sede Pereira
      </button>
    </div>

  </div>
</div>
