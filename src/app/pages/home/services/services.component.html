<section id="servicios" class="py-24 bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-5xl font-extrabold text-blue-900 tracking-tight uppercase">Nuestros Servicios</h2>
      <p class="mt-4 text-lg md:text-xl text-gray-500 max-w-3xl mx-auto">Excelencia veterinaria en cada detalle, cuidando a tu mascota con amor y tecnología.</p>
      <div class="mt-6 w-28 h-1.5 bg-orange-500 mx-auto rounded-full"></div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">

      <app-tarjeta-servicio *ngFor="let servicio of servicios"
                            [titulo]="servicio.titulo"
                            [descripcion]="servicio.descripcion"
                            [imagenUrl]="servicio.imagenUrl"
                            (agendar)="abrirAgenda($event)">
      </app-tarjeta-servicio>

    </div>

  </div>
</section>

<app-modal-agenda [mostrar]="mostrarModal"
                  [servicioSeleccionado]="servicioSeleccionado"
                  (cerrar)="cerrarAgenda()">
</app-modal-agenda>
