<section class="py-10 md:py-16 bg-gray-50/40 dark:bg-gray-900/60 backdrop-blur-sm transition-colors duration-300">
  <div class="container mx-auto px-4">
    
    <h2 class="text-3xl md:text-6xl font-extrabold text-[#459AAA] dark:text-[#459AAA] tracking-tight text-center mb-8 md:mb-12">
      Experiencias
    </h2>

    <!-- group agregado -->
    <div class="relative max-w-5xl mx-auto group">

      <!-- Slider -->
      <div class="overflow-hidden rounded-2xl md:rounded-3xl shadow-lg md:shadow-xl">
        <div class="flex transition-transform duration-500 ease-in-out"
             [style.transform]="'translateX(-' + (customerIndex * 100) + '%)'">

          <div *ngFor="let slide of slides; trackBy: trackByIndex"
               class="w-full flex-shrink-0">

            <div class="bg-white/50 dark:bg-gray-800/60 backdrop-blur-sm p-3 md:p-8 rounded-2xl md:rounded-3xl transition-colors duration-300">
  
              <div class="grid md:grid-cols-2 gap-4 md:gap-10">
                
                <div *ngFor="let experience of slide; trackBy: trackByExperience"
                    class="flex flex-col items-center">
                  
                  <!-- Imagen: compacta en móvil, grande en desktop -->
                  <img [src]="experience.url"
                      loading="lazy"
                      decoding="async"
                      [alt]="experience.name"
                      class="w-full h-40 md:h-80 object-contain mb-2 md:mb-5">
                  
                  <!-- Texto del comentario: compacto en móvil, grande en desktop -->
                  <div class="text-center px-1 md:px-4">
                    <p class="text-sm md:text-xl text-gray-700 dark:text-gray-300 mb-2 md:mb-5 italic leading-tight md:leading-relaxed">
                      "{{ experience.comment }}"
                    </p>
                  </div>
                  
                </div>
                
              </div>
              
            </div>

          </div>

        </div>
      </div>

      <!-- Botón izquierda -->
      <button (click)="prevCustomerSlide()"
              aria-label="Anterior"
              class="absolute left-4 md:-left-6 top-1/2 transform -translate-y-1/2
                     bg-gray-500 dark:bg-gray-700 hover:bg-orange-500
                     text-white rounded-full p-3 md:p-4 backdrop-blur-sm shadow-lg
                     opacity-0 group-hover:opacity-100
                     translate-x-[-10px] group-hover:translate-x-0
                     transition-all duration-300">

        <svg class="w-5 h-5 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>

      </button>

      <!-- Botón derecha -->
      <button (click)="nextCustomerSlide()"
              aria-label="Siguiente"
              class="absolute right-4 md:-right-6 top-1/2 transform -translate-y-1/2
                     bg-gray-500 dark:bg-gray-700 hover:bg-orange-500
                     text-white rounded-full p-3 md:p-4 backdrop-blur-sm shadow-lg
                     opacity-0 group-hover:opacity-100
                     translate-x-[10px] group-hover:translate-x-0
                     transition-all duration-300">

        <svg class="w-5 h-5 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>

      </button>

      <!-- Indicadores -->
      <div class="flex justify-center mt-6 md:mt-8">
        <span *ngFor="let slide of slides; let i = index; trackBy: trackByIndex"
              (click)="customerIndex = i"
              class="w-3 h-3 md:w-4 md:h-4 rounded-full mx-1 cursor-pointer transition-all"
              [ngClass]="i === customerIndex ? 'bg-orange-500' : 'bg-gray-300 dark:bg-gray-600'">
        </span>
      </div>

    </div>
  </div>
</section>
