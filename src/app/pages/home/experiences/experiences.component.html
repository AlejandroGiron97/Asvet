<!-- Slider de Experiencias de Clientes -->
<section class="py-16 bg-gray-50/40 backdrop-blur-sm">
  <div class="container mx-auto px-4">
    <h2 class="text-3xl md:text-5xl font-extrabold text-blue-900 tracking-tight text-center mb-20">Experiencias</h2>

    <div class="relative max-w-4xl mx-auto">
      <div class="overflow-hidden rounded-2xl shadow-lg">
        <div class="flex transition-transform duration-500 ease-in-out" [style.transform]="'translateX(-' + (customerIndex * 100) + '%)'">
          <div *ngFor="let slide of slides" class="w-full flex-shrink-0">
            <div class="bg-white/50 backdrop-blur-sm p-8 rounded-2xl">
              <div class="grid md:grid-cols-2 gap-6">
                <div *ngFor="let experience of slide" class="flex flex-col items-center">
                  <img [src]="experience.url" alt="Comentario de cliente" class="w-85 h-85 object-contain mb-4">
                  <div class="text-center">
                    <p class="text-lg text-gray-700 mb-4 italic">"{{ experience.comment }}"</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button (click)="prevCustomerSlide()" class="absolute left-4 top-1/2 transform -translate-y-1/2 bg-gray-500 hover:bg-orange-500 text-white rounded-full p-3 backdrop-blur-sm transition-all shadow-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <button (click)="nextCustomerSlide()" class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-gray-500 hover:bg-orange-500 text-white rounded-full p-3 backdrop-blur-sm transition-all shadow-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </button>

      <div class="flex justify-center mt-6">
        <span *ngFor="let slide of slides; let i = index"
              (click)="customerIndex = i"
              class="w-3 h-3 rounded-full mx-1 cursor-pointer transition-all"
              [ngClass]="i === customerIndex ? 'bg-orange-500' : 'bg-gray-300'">
        </span>
      </div>
    </div>
  </div>
</section>
