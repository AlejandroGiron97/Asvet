<section class="relative w-full min-h-[95vh] md:min-h-screen overflow-hidden bg-gray-900 border-none outline-none">

  <div *ngFor="let slide of slides; let i = index"
       class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
       [ngClass]="i === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'">

    <div class="absolute inset-0 overflow-hidden z-0">
      <img [src]="slide.url" class="w-full h-full object-cover">
    </div>

    <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 sm:px-6 md:px-20 z-20 bg-gradient-to-b from-black/70 via-black/40 to-transparent">

      <!-- Tamaño del slider -->
      <div class="h-[220px] md:h-[260px] flex flex-col justify-end items-center mb-14 pt-4">
        <h1 class="text-4xl md:text-6xl lg:text-7xl font-extrabold text-white mb-4 drop-shadow-2xl animate-fadeInUp tracking-tight leading-tight max-w-5xl">
        </h1>
        <p class="text-xl md:text-2xl text-gray-200 font-medium drop-shadow-lg max-w-3xl animate-fadeInUp" style="animation-delay: 0.2s;">
        </p>
      </div>

      <div class="flex flex-col sm:flex-row gap-5 animate-fadeInUp" style="animation-delay: 0.4s;">
        <button (click)="irASede('manizales')" class="bg-transparent text-white border-2 border-white font-bold px-10 py-4 rounded-full text-lg hover:bg-orange-500 hover:border-orange-500 transition-all duration-300 flex items-center gap-2 group hover:scale-105 shadow-xl cursor-pointer">
          🏥 Sede Manizales <span class="group-hover:translate-x-1 transition-transform">→</span>
        </button>
        <button (click)="irASede('pereira')" class="bg-transparent text-white border-2 border-white font-bold px-10 py-4 rounded-full text-lg hover:bg-orange-500 hover:border-orange-500 transition-all duration-300 flex items-center gap-2 group hover:scale-105 shadow-xl cursor-pointer">
          🏥 Sede Pereira <span class="group-hover:translate-x-1 transition-transform">→</span>
        </button>
      </div>

    </div>
  </div>

  <button (click)="prevSlide()" class="absolute left-6 top-1/2 transform -translate-y-1/2 z-30 bg-black/30 hover:bg-orange-500 text-white rounded-full p-4 backdrop-blur-sm transition-all shadow-xl hidden md:block">
    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
  </button>
  <button (click)="nextSlide()" class="absolute right-6 top-1/2 transform -translate-y-1/2 z-30 bg-black/30 hover:bg-orange-500 text-white rounded-full p-4 backdrop-blur-sm transition-all shadow-xl hidden md:block">
    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
  </button>

  <div class="absolute -bottom-1 left-0 w-full overflow-hidden leading-none z-30 pointer-events-none">
    <svg class="relative block w-full h-[60px] md:h-[100px]" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
      <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.93,197.36,97.66,241.69,82.83,283.47,64.25,321.39,56.44Z" class="fill-gray-50"></path>
    </svg>
  </div>
</section>

<app-services></app-services>
<app-locations [sedeSeleccionada]="sedeActiva"></app-locations>
