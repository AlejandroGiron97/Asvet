<!-- ═══════════════════════════════════════
     SLIDER RECTANGULAR
════════════════════════════════════════ -->
<section class="pt-2 bg-gray-50 dark:bg-gray-900/60 transition-colors duration-300">
  <div class="max-w-[95rem] mx-auto px-3 sm:px-6 lg:px-8">

    <div class="relative w-full h-[300px] sm:h-[460px] md:h-[580px] lg:h-[660px]
                rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl group">

      <!-- ── Slides ── -->
      <div *ngFor="let slide of slides; let i = index"
           class="absolute inset-0 transition-opacity duration-700 ease-in-out"
           [ngClass]="i === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'">

        <picture class="w-full h-full block">
          <source media="(max-width: 768px)" [srcset]="slide.urlMobile">
          <img [src]="slide.urlDesktop"
               class="w-full h-full object-contain md:object-cover bg-gray-100 dark:bg-gray-900"
               width="1920"
               height="1080"
               [attr.loading]="i === 0 ? 'eager' : 'lazy'"
               [attr.fetchpriority]="i === 0 ? 'high' : 'auto'"
               [attr.decoding]="i === 0 ? 'sync' : 'async'"
               [attr.alt]="'ASVET Clínica Veterinaria Manizales y Pereira - imagen ' + (i + 1)">
        </picture>

        <!-- Gradiente: suave en móvil, más fuerte en desktop -->
        <div class="absolute inset-0 bg-gradient-to-r from-black/40 via-black/10 to-transparent"></div>
      </div>

      <!-- ── Flechas hover desktop ── -->
      <button (click)="prevSlide()"
              aria-label="Imagen anterior"
              class="absolute left-3 md:left-5 top-1/2 -translate-y-1/2 z-30
                     bg-black/25 hover:bg-orange-500 text-white rounded-full p-2.5 md:p-3
                     backdrop-blur-sm transition-all shadow-xl
                     opacity-0 group-hover:opacity-100 hidden md:flex items-center justify-center">
        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <button (click)="nextSlide()"
              aria-label="Imagen siguiente"
              class="absolute right-3 md:right-5 top-1/2 -translate-y-1/2 z-30
                     bg-black/25 hover:bg-orange-500 text-white rounded-full p-2.5 md:p-3
                     backdrop-blur-sm transition-all shadow-xl
                     opacity-0 group-hover:opacity-100 hidden md:flex items-center justify-center">
        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
        </svg>
      </button>

    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     SERVICIOS — carga al hacer scroll
════════════════════════════════════════ -->
@defer (on viewport; on idle) {
  <app-services></app-services>
} @placeholder (minimum 400ms) {
  <section class="py-24 bg-gray-50/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center mb-16 space-y-4">
        <div class="h-10 w-64 bg-gray-200 rounded-full mx-auto animate-pulse"></div>
        <div class="h-4 w-80 bg-gray-200 rounded-full mx-auto animate-pulse"></div>
        <div class="h-1.5 w-28 bg-gray-200 rounded-full mx-auto animate-pulse"></div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
        <div *ngFor="let i of [1,2,3,4,5,6,7,8]"
             class="bg-white rounded-2xl md:rounded-3xl overflow-hidden shadow-sm">
          <div class="h-32 md:h-56 lg:h-64 bg-gray-200 animate-pulse"></div>
          <div class="p-4 md:p-6 space-y-3">
            <div class="h-5 bg-gray-200 rounded-full animate-pulse"></div>
            <div class="h-3 bg-gray-200 rounded-full animate-pulse w-3/4 mx-auto hidden md:block"></div>
            <div class="h-9 bg-gray-200 rounded-full animate-pulse mt-2"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
}
