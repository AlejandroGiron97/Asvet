<app-header></app-header>
<main>
  <router-outlet></router-outlet>
</main>

@defer (on idle) {
  <app-footer></app-footer>
} @placeholder {
  <div class="h-40 bg-gray-900/50"></div>
}

<div *ngIf="mostrarCookies"
     class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] md:w-[600px]
            bg-white dark:bg-gray-800
            rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700
            p-6 z-[100] animate-fadeInUp flex flex-col sm:flex-row items-center justify-between gap-4
            transition-colors duration-300">
  <div class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed text-center sm:text-left">
    <span class="text-xl inline-block mb-1">🍪</span><br>
    Usamos cookies para mejorar tu experiencia y analizar el tráfico de nuestra web. Al continuar navegando, aceptas su uso.
  </div>
  <button (click)="aceptarCookies()"
          class="whitespace-nowrap bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-full transition-colors w-full sm:w-auto">
    ¡Entendido!
  </button>
</div>
